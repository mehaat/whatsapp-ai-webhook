apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "mehaat.fullname" . }}-env
  labels:
    {{- include "mehaat.labels" . | nindent 4 }}
data:
  {{- range $k, $v := .Values.env }}
  {{ $k }}: {{ $v | quote }}
  {{- end }}
  {{- if and .Values.redis.enabled (not .Values.env.QUEUE_BACKEND) }}
  QUEUE_BACKEND: "celery"
  {{- end }}
