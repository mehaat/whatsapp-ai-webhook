# Alembic configuration for ME-HAAT Fashion AI Bot v7.0.
# The database URL is resolved at runtime from the app config (env.py), so the
# sqlalchemy.url below is only a placeholder. Usage:
#   pip install alembic
#   alembic revision --autogenerate -m "describe change"
#   alembic upgrade head
#
# NOTE: the app also runs a lightweight additive auto-migration on boot
# (database/migrations.py). Alembic is for reviewed, versioned schema changes
# (including destructive ones) in mature deployments.
[alembic]
script_location = alembic
prepend_sys_path = .
sqlalchemy.url = sqlite:///mehaat.db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
