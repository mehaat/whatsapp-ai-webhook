<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sign in · ME-HAAT Fashion AI Admin</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="{{ url_for('admin.static', filename='dashboard.css') }}" />
</head>
<body>
<div class="login-wrap">
  <form class="login-card card-surface" method="POST" action="{{ url_for('admin.login', next=request.args.get('next','')) }}" autocomplete="off">
    <div class="logo-lg">M</div>
    <h2>ME-HAAT Admin</h2>
    <p class="sub">Sign in to the Fashion AI operations console.</p>

    {% if error %}<div class="alert-error"><i class="bi bi-exclamation-triangle"></i> {{ error }}</div>{% endif %}

    <label for="username">Username</label>
    <input class="field" id="username" name="username" type="text" required autofocus maxlength="80" />

    <label for="password">Password</label>
    <input class="field" id="password" name="password" type="password" required maxlength="256" />

    <button class="btn primary" type="submit" style="width:100%;justify-content:center;margin-top:20px">
      <i class="bi bi-shield-lock"></i> Sign in
    </button>
    <p class="sub" style="margin-top:18px;text-align:center;font-size:0.78rem">
      Protected area · ME-HAAT Fashion AI Bot
    </p>
  </form>
</div>
<script>
  (function () {
    var saved = localStorage.getItem("mehaat-admin-theme");
    if (!saved) saved = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
    document.documentElement.setAttribute("data-theme", saved);
  })();
</script>
</body>
</html>
