services:
  - type: web
    name: mehaat-fashion-ai-bot
    env: python
    plan: free
    region: singapore
    buildCommand: pip install -r requirements.txt
    # Run Alembic migrations before boot, then start Gunicorn. On Render Free
    # there is NO persistent disk — durable state lives in Neon PostgreSQL
    # (DATABASE_URL below), so no `disk:` mount is declared.
    startCommand: alembic upgrade head && gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --timeout 30
    healthCheckPath: /health
    envVars:
      - key: VERIFY_TOKEN
        sync: false
      - key: WHATSAPP_TOKEN
        sync: false
      - key: PHONE_NUMBER_ID
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: SHOPIFY_API_KEY
        sync: false
      - key: SHOPIFY_API_SECRET
        sync: false
      - key: SHOPIFY_APP_URL
        sync: false
      - key: SHOPIFY_SCOPES
        value: "read_products,read_orders,read_inventory,read_customers,write_draft_orders"
      - key: SHOPIFY_WEBHOOK_SECRET
        sync: false
      # Meta App Secret — verifies inbound webhook signatures (recommended).
      - key: WHATSAPP_APP_SECRET
        sync: false
      # Legacy JSON token path — no longer used for persistence (tokens live in
      # DATABASE_URL now). Kept on an ephemeral path only for backward-compat.
      - key: TOKEN_STORE_PATH
        value: /tmp/shop_tokens.json
      - key: PYTHON_VERSION
        value: 3.12.7
      # --- v4.0 (all optional; safe defaults preserve v3.0 behaviour) ---
      # Native WhatsApp/Meta Commerce catalog id (blank -> text product cards).
      - key: WHATSAPP_CATALOG_ID
        sync: false
      # Send a short Gemini recommendation after product cards ("false" = cards only).
      - key: PRODUCT_RECO_ENABLED
        value: "true"
      # Structured logs: "text" (default) or "json".
      - key: LOG_FORMAT
        value: "text"
      # Enables the optional AI-interaction audit log. The token store, admin
      # dashboard and commerce data persist via DATABASE_URL regardless.
      - key: USE_DATABASE
        value: "true"
      # DATABASE_URL is REQUIRED on Render Free (no persistent disk). Paste your
      # Neon connection string here (Neon dashboard -> Connection Details). A
      # bare postgres:// URL is auto-normalized to the psycopg 3 dialect.
      # Example: postgresql://user:pass@ep-xxx.region.aws.neon.tech/dbname?sslmode=require
      - key: DATABASE_URL
        sync: false
      # Optional Fernet key to encrypt Shopify tokens at rest (blank -> plaintext).
      - key: TOKEN_ENCRYPTION_KEY
        sync: false
      # --- v4.2 Admin Dashboard (login-protected console at /admin) ---
      # Admin login credentials (set real values in the Render dashboard).
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      # Optional Werkzeug hash (takes precedence over ADMIN_PASSWORD when set).
      - key: ADMIN_PASSWORD_HASH
        sync: false
      # Stable session-signing secret (recommended). Generate a random value.
      - key: ADMIN_SECRET_KEY
        sync: false
      # ADMIN_DB_PATH intentionally unset so the dashboard shares the ONE unified
      # database selected by DATABASE_URL (Neon Postgres in production).
      - key: ADMIN_SESSION_TIMEOUT_MIN
        value: "60"
      # --- v6.0 Enterprise Commerce (optional; safe defaults) ---
      # Commerce orders/payments/tracking persist via DATABASE_URL (Neon
      # Postgres). NOTE: /tmp is EPHEMERAL on Render Free — generated invoice /
      # export PDFs do not survive a restart; regenerate on demand or offload to
      # object storage if you need them durable.
      - key: COMMERCE_ENABLED
        value: "true"
      - key: INVOICE_OUTPUT_DIR
        value: /tmp/invoices
      - key: DEFAULT_CURRENCY
        value: "INR"
      - key: DELIVERY_ESTIMATE
        value: "3-5 Days"
      - key: AUTO_DRAFT_ORDER
        value: "true"
      - key: STOCK_VALIDATION_ENABLED
        value: "false"
      # New-order admin alert recipient (E.164 digits, no +).
      - key: ADMIN_WHATSAPP_NUMBER
        sync: false
      # Business identity printed on invoices.
      - key: BUSINESS_NAME
        value: "ME-HAAT Fashion"
      - key: BUSINESS_ADDRESS
        sync: false
      - key: BUSINESS_GSTIN
        sync: false
      - key: BUSINESS_PHONE
        sync: false
      - key: BUSINESS_EMAIL
        sync: false
      # Payments: manual_upi works with no gateway account; set a provider +
      # its credentials to enable hosted payment links.
      - key: PAYMENT_PROVIDER
        value: "manual_upi"
      - key: UPI_VPA
        sync: false
      - key: UPI_PAYEE_NAME
        value: "ME-HAAT Fashion"
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: CASHFREE_APP_ID
        sync: false
      - key: CASHFREE_SECRET_KEY
        sync: false
      - key: PHONEPE_MERCHANT_ID
        sync: false
      - key: PHONEPE_SALT_KEY
        sync: false
      # JWT signing secret for the programmatic order/tracking API.
      - key: JWT_SECRET
        sync: false
      - key: API_KEY
        sync: false
      # --- v6.1 (CRM / RBAC / jobs / inventory reservation) ---
      - key: JOBS_ENABLED
        value: "true"
      - key: JOBS_WORKERS
        value: "2"
      - key: INVENTORY_RESERVATION_ENABLED
        value: "true"
      - key: INVENTORY_SYNC_ENABLED
        value: "false"
      - key: DEFAULT_ADMIN_ROLE
        value: "staff"
      # --- v7.0 ---
      - key: SHIPPING_PROVIDER
        value: "manual"
      - key: SHIPROCKET_EMAIL
        sync: false
      - key: SHIPROCKET_PASSWORD
        sync: false
      - key: DELHIVERY_TOKEN
        sync: false
      - key: ADMIN_2FA_ENABLED
        value: "false"
      - key: ADMIN_IP_ALLOWLIST
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: METRICS_ENABLED
        value: "true"
      # --- v8.0 ---
      - key: QUEUE_BACKEND
        value: "inprocess"
      - key: REDIS_URL
        sync: false
      - key: MULTI_TENANT_ENABLED
        value: "false"
      - key: DEFAULT_TENANT_SLUG
        value: "default"
      - key: DEVELOPER_PORTAL_ENABLED
        value: "true"
      - key: DATA_RETENTION_DAYS
        value: "0"
      - key: COMPLIANCE_EXPORT_DIR
        value: /tmp/exports
      # --- v9.0 ---
      - key: CACHE_ENABLED
        value: "true"
      - key: RECOMMENDATIONS_ENABLED
        value: "true"
      - key: VISUAL_SEARCH_ENABLED
        value: "true"
      - key: AI_STYLIST_ENABLED
        value: "true"
      - key: VISUAL_EMBEDDER
        value: "histogram"
      - key: SENTRY_ENVIRONMENT
        value: "production"
      # --- v10.0 ---
      - key: AGENTS_ENABLED
        value: "true"
      - key: AGENTS_WHATSAPP
        value: "false"
      - key: RAG_ENABLED
        value: "true"
      - key: MCP_ENABLED
        value: "true"
      - key: VOICE_ENABLED
        value: "true"
      - key: APPROVAL_REQUIRED
        value: "true"
      # --- v10.1 Stable ---
      # Backend is chosen by DATABASE_URL (Neon Postgres above). UNIFIED_DB_PATH
      # only applies to a local SQLite fallback and is not needed on Render.
      - key: STRICT_STARTUP
        value: "false"
      - key: DEV_MODE
        value: "false"
      - key: LOG_DIR
        value: /tmp/logs
