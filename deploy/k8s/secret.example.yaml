# Example Secret. Copy to secret.yaml, fill REAL values, and DO NOT commit it.
# Create instead from your shell to avoid writing secrets to disk:
#   kubectl -n mehaat create secret generic mehaat-secret \
#     --from-literal=WHATSAPP_TOKEN=... \
#     --from-literal=GEMINI_API_KEY=... \
#     --from-literal=SHOPIFY_API_SECRET=... \
#     --from-literal=JWT_SECRET=... \
#     --from-literal=ADMIN_PASSWORD=... \
#     --from-literal=REDIS_URL=redis://mehaat-redis:6379/0 \
#     --from-literal=DATABASE_URL='postgresql+psycopg2://mehaat:pass@mehaat-postgres:5432/mehaat'
apiVersion: v1
kind: Secret
metadata:
  name: mehaat-secret
  namespace: mehaat
  labels:
    app.kubernetes.io/name: mehaat
type: Opaque
stringData:
  VERIFY_TOKEN: "changeme-verify-token"
  WHATSAPP_TOKEN: "changeme-whatsapp-token"
  WHATSAPP_APP_SECRET: "changeme-meta-app-secret"
  PHONE_NUMBER_ID: "000000000000000"
  GEMINI_API_KEY: "changeme-gemini-key"
  SHOPIFY_API_KEY: "changeme-shopify-client-id"
  SHOPIFY_API_SECRET: "changeme-shopify-client-secret"
  SHOPIFY_WEBHOOK_SECRET: "changeme-shopify-webhook-secret"
  JWT_SECRET: "changeme-jwt-secret"
  API_KEY: "changeme-api-key"
  ADMIN_USERNAME: "admin"
  ADMIN_PASSWORD: "changeme-strong-password"
  ADMIN_SECRET_KEY: "changeme-session-signing-secret"
  TOKEN_ENCRYPTION_KEY: ""
  SENTRY_DSN: ""
  REDIS_URL: "redis://mehaat-redis:6379/0"
  DATABASE_URL: "postgresql+psycopg2://mehaat:pass@mehaat-postgres:5432/mehaat"
