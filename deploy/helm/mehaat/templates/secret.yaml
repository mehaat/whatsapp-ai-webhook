apiVersion: v1
kind: Secret
metadata:
  name: {{ include "mehaat.fullname" . }}-secret
  labels:
    {{- include "mehaat.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- /* Sensitive keys the operator fills via .Values.secretEnv. Empty by default. */}}
  {{- range $k, $v := .Values.secretEnv }}
  {{ $k }}: {{ $v | quote }}
  {{- end }}
  {{- /* Convenience: map external Redis / Postgres URLs into the standard env keys. */}}
  {{- if .Values.redis.externalRedisUrl }}
  REDIS_URL: {{ .Values.redis.externalRedisUrl | quote }}
  {{- end }}
  {{- if .Values.postgresql.externalDatabaseUrl }}
  DATABASE_URL: {{ .Values.postgresql.externalDatabaseUrl | quote }}
  {{- end }}
