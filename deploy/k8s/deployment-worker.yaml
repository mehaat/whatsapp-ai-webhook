apiVersion: apps/v1
kind: Deployment
metadata:
  name: mehaat-worker
  namespace: mehaat
  labels:
    app.kubernetes.io/name: mehaat
    app.kubernetes.io/component: worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: mehaat
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mehaat
        app.kubernetes.io/component: worker
    spec:
      serviceAccountName: mehaat
      containers:
        - name: worker
          image: ghcr.io/me-haat/mehaat-fashion-ai-bot:9.0
          imagePullPolicy: IfNotPresent
          command: ["celery"]
          args:
            - "-A"
            - "celery_app.celery_app"
            - "worker"
            - "-Q"
            - "mehaat"
          envFrom:
            - configMapRef:
                name: mehaat-env
            - secretRef:
                name: mehaat-secret
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mehaat-beat
  namespace: mehaat
  labels:
    app.kubernetes.io/name: mehaat
    app.kubernetes.io/component: beat
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: mehaat
      app.kubernetes.io/component: beat
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mehaat
        app.kubernetes.io/component: beat
    spec:
      serviceAccountName: mehaat
      containers:
        - name: beat
          image: ghcr.io/me-haat/mehaat-fashion-ai-bot:9.0
          imagePullPolicy: IfNotPresent
          command: ["celery"]
          args:
            - "-A"
            - "celery_app.celery_app"
            - "beat"
          envFrom:
            - configMapRef:
                name: mehaat-env
            - secretRef:
                name: mehaat-secret
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
