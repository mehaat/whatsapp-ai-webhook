apiVersion: v1
kind: ConfigMap
metadata:
  name: mehaat-env
  namespace: mehaat
  labels:
    app.kubernetes.io/name: mehaat
data:
  PORT: "5000"
  LOG_FORMAT: "json"
  LOG_LEVEL: "INFO"
  USE_DATABASE: "true"
  COMMERCE_ENABLED: "true"
  METRICS_ENABLED: "true"
  QUEUE_BACKEND: "celery"
  JOBS_ENABLED: "true"
  MULTI_TENANT_ENABLED: "false"
  DEVELOPER_PORTAL_ENABLED: "true"
  TOKEN_STORE_PATH: "/var/data/shop_tokens.json"
  INVOICE_OUTPUT_DIR: "/var/data/invoices"
  SHOPIFY_SCOPES: "read_products,read_orders,read_inventory,read_customers,write_draft_orders"
