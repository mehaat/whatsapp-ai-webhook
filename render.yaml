services:
  - type: web
    name: mehaat-fashion-ai-bot
    env: python
    plan: starter
    region: singapore
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 30
    healthCheckPath: /health
    disk:
      name: shop-token-store
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: VERIFY_TOKEN
        sync: false
      - key: WHATSAPP_TOKEN
        sync: false
      - key: PHONE_NUMBER_ID
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: SHOPIFY_API_KEY
        sync: false
      - key: SHOPIFY_API_SECRET
        sync: false
      - key: SHOPIFY_APP_URL
        sync: false
      - key: SHOPIFY_SCOPES
        value: "read_products,read_orders,read_inventory,read_customers,write_draft_orders"
      - key: SHOPIFY_WEBHOOK_SECRET
        sync: false
      - key: TOKEN_STORE_PATH
        value: /var/data/shop_tokens.json
      - key: PYTHON_VERSION
        value: 3.12.7
