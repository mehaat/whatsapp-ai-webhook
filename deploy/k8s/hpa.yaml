apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: mehaat-web
  namespace: mehaat
  labels:
    app.kubernetes.io/name: mehaat
    app.kubernetes.io/component: web
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: mehaat-web
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
