# ME-HAAT Fashion AI Bot v8.0 — Prometheus configuration.
# Scrapes the Flask app's /metrics endpoint (Prometheus text exposition format).
#
# Run alongside Grafana via docker-compose (see docs/MONITORING.md).

global:
  # How frequently to scrape targets by default.
  scrape_interval: 15s
  # How long until a scrape request times out.
  scrape_timeout: 10s
  # How frequently to evaluate rules (none defined yet).
  evaluation_interval: 15s
  external_labels:
    monitor: mehaat
    app: mehaat-fashion-ai-bot

scrape_configs:
  - job_name: mehaat
    metrics_path: /metrics
    scheme: http
    static_configs:
      # "app" matches the docker-compose service name; both containers share
      # the compose network, so Prometheus can resolve it by DNS.
      - targets:
          - "app:5000"
        labels:
          service: mehaat-app
    # Alternative target when the app runs on the Docker host rather than as a
    # compose service (Docker Desktop / rootless). Uncomment and swap the
    # target above if needed:
    #   - targets:
    #       - "host.docker.internal:5000"
    #     labels:
    #       service: mehaat-app
