apiVersion: apps/v1
kind: Deployment
metadata:
  name: mehaat-web
  namespace: mehaat
  labels:
    app.kubernetes.io/name: mehaat
    app.kubernetes.io/component: web
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: mehaat
      app.kubernetes.io/component: web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mehaat
        app.kubernetes.io/component: web
    spec:
      serviceAccountName: mehaat
      containers:
        - name: web
          image: ghcr.io/me-haat/mehaat-fashion-ai-bot:9.0
          imagePullPolicy: IfNotPresent
          command: ["gunicorn"]
          args:
            - "app:app"
            - "--bind=0.0.0.0:5000"
            - "--workers=1"
            - "--threads=4"
            - "--timeout=60"
          ports:
            - name: http
              containerPort: 5000
          envFrom:
            - configMapRef:
                name: mehaat-env
            - secretRef:
                name: mehaat-secret
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          volumeMounts:
            - name: data
              mountPath: /var/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: mehaat-data
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: mehaat
  namespace: mehaat
  labels:
    app.kubernetes.io/name: mehaat
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mehaat-data
  namespace: mehaat
  labels:
    app.kubernetes.io/name: mehaat
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
