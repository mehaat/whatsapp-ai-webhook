# ME-HAAT Fashion AI Bot v7.0 — sample Nginx reverse proxy.
# Terminates TLS and forwards to the Gunicorn app on :5000.
# Point server_name at your domain and reference your certs (e.g. Certbot).

upstream mehaat_app {
    server 127.0.0.1:5000;
    keepalive 16;
}

server {
    listen 80;
    server_name your-domain.com;
    # Redirect all HTTP to HTTPS.
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl http2;
    server_name your-domain.com;

    ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    # WhatsApp/Meta and Shopify send webhooks here; allow reasonable bodies.
    client_max_body_size 8m;

    # Do not expose the Prometheus metrics endpoint publicly.
    location /metrics {
        allow 10.0.0.0/8;
        allow 127.0.0.1;
        deny all;
        proxy_pass http://mehaat_app;
    }

    location / {
        proxy_pass http://mehaat_app;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
